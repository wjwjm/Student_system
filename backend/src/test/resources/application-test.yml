spring:
  datasource:
    url: jdbc:h2:mem:student_system_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

app:
  jwt:
    secret: test-signing-key-at-least-32-characters-long
    expiration-ms: 28800000
